[tool.black]
line-length = 88
target-version = ["py311"]

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["api", "services", "models", "core", "frontend", "tests"]
known_third_party = ["fastapi", "pydantic", "loguru", "transformers", "torch", "pydub"]

[tool.ruff]
line-length = 88
target-version = "py311"
exclude = ["logs", "uploads", ".venv", "venv", "dist", "build"]
